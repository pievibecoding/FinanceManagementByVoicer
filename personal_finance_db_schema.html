
<style>

.legend-dot { width: 10px; height: 10px; border-radius: 2px; }
</style>

<div id="erd"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#534AB7"></div>Auth & User</div>
  <div class="legend-item"><div class="legend-dot" style="background:#0F6E56"></div>Accounts</div>
  <div class="legend-item"><div class="legend-dot" style="background:#BA7517"></div>Transactions</div>
  <div class="legend-item"><div class="legend-dot" style="background:#185FA5"></div>Categories & Budget</div>
  <div class="legend-item"><div class="legend-dot" style="background:#993C1D"></div>Advanced features</div>
</div>

<div id="source-links">
  <a class="src-badge" href="https://github.com/moneymanagerex/database" onclick="openLink('https://github.com/moneymanagerex/database')"><i class="ti ti-brand-github" aria-hidden="true"></i>moneymanagerex/database</a>
  <a class="src-badge" href="https://github.com/kirill-markin/expense-budget-tracker" onclick="openLink('https://github.com/kirill-markin/expense-budget-tracker')"><i class="ti ti-brand-github" aria-hidden="true"></i>kirill-markin/expense-budget-tracker</a>
  <a class="src-badge" href="https://github.com/georgezefko/finance-tracker" onclick="openLink('https://github.com/georgezefko/finance-tracker')"><i class="ti ti-brand-github" aria-hidden="true"></i>georgezefko/finance-tracker</a>
  <a class="src-badge" href="https://github.com/weismanm12/finances-database" onclick="openLink('https://github.com/weismanm12/finances-database')"><i class="ti ti-brand-github" aria-hidden="true"></i>weismanm12/finances-database</a>
</div>

<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor: dark ? '#CECBF6' : '#26215C',
    primaryBorderColor: dark ? '#7F77DD' : '#534AB7',
    secondaryColor: dark ? '#085041' : '#E1F5EE',
    tertiaryColor: dark ? '#0C447C' : '#E6F1FB',
  },
});

const diagram = `erDiagram
  users {
    int user_id PK
    string username UK
    string email UK
    string password_hash
    timestamp created_at
    timestamp updated_at
    bool is_deleted
  }
  user_settings {
    int setting_id PK
    int user_id FK
    string currency
    string language
    string timezone
  }
  accounts {
    int account_id PK
    int user_id FK
    string account_name
    string account_type
    string currency
    decimal balance
    bool is_deleted
    timestamp created_at
    timestamp updated_at
  }
  transactions {
    bigint transaction_id PK
    int user_id FK
    int from_account_id FK
    int to_account_id FK
    int category_id FK
    int payee_id FK
    decimal amount
    string transaction_type
    string status
    string description
    date transaction_date
    timestamp created_at
    bool is_deleted
  }
  split_transactions {
    int split_id PK
    bigint transaction_id FK
    int category_id FK
    decimal amount
    string notes
  }
  categories {
    int category_id PK
    int user_id FK
    string category_name
    string icon
    int parent_id FK
    bool is_system
    bool active
  }
  budgets {
    int budget_id PK
    int user_id FK
    int category_id FK
    decimal amount_limit
    date start_date
    date end_date
  }
  payees {
    int payee_id PK
    int user_id FK
    string payee_name
    int default_category_id FK
  }
  recurring_transactions {
    int recurring_id PK
    int user_id FK
    int account_id FK
    int category_id FK
    decimal amount
    string frequency
    date next_run_date
    date end_date
    bool is_active
  }
  exchange_rates {
    int rate_id PK
    string from_currency
    string to_currency
    decimal rate
    timestamp effective_at
  }
  tags {
    int tag_id PK
    int user_id FK
    string tag_name
  }
  transaction_tags {
    bigint transaction_id FK
    int tag_id FK
  }
  audit_logs {
    bigint log_id PK
    int user_id FK
    string action
    string table_name
    bigint record_id
    json old_value
    json new_value
    timestamp created_at
  }
  users ||--o{ user_settings : has
  users ||--o{ accounts : owns
  users ||--o{ transactions : makes
  users ||--o{ categories : creates
  users ||--o{ budgets : sets
  users ||--o{ payees : tracks
  users ||--o{ recurring_transactions : schedules
  users ||--o{ tags : defines
  accounts ||--o{ transactions : source
  accounts ||--o{ transactions : destination
  categories ||--o{ transactions : classifies
  categories ||--o{ split_transactions : classifies
  categories ||--o{ budgets : limits
  categories ||--o{ categories : parent
  payees ||--o{ transactions : involves
  transactions ||--o{ split_transactions : splits-into
  transactions ||--o{ transaction_tags : tagged-by
  tags ||--o{ transaction_tags : applied-to
  accounts ||--o{ recurring_transactions : debits
  categories ||--o{ recurring_transactions : categorizes
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
