services:
  # Backend Flask API Service
  - type: web
    name: finance-management-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python backend/main.py
    healthCheckPath: /ping
    envVars:
      - key: TURSO_DB_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: AUTH_SECRET_KEY
        generateValue: true
      - key: AUTH_TOKEN_EXPIRE_DAYS
        value: "1"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: PORT
        value: "5000"

  # Frontend Express + Vite Service
  - type: web
    name: fmbv
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_FLASK_BACKEND_URL
        value: https://finance-management-backend-i0cy.onrender.com
      - key: FLASK_BACKEND_URL
        value: https://finance-management-backend-i0cy.onrender.com
      - key: PORT
        value: "3000"
